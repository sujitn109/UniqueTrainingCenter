@model UniqueClassesSite.Models.AttendanceVM

<div class="container mt-4" style="max-width: 700px; font-family: Arial, sans-serif;">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">📅 दैनिक उपस्थिती पत्रक (Daily Attendance)</h4>
            <span class="badge bg-primary">@Model.AttendanceDate.ToString("dd-MM-yyyy")</span>
        </div>

        <div class="card-body">
            <form asp-action="SaveDailyAttendance" method="post">
                <input type="hidden" asp-for="AttendanceDate" />
                <input type="hidden" asp-for="SelectedCourse" />

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 15%;">रोल नं.</th>
                                <th style="width: 60%;">विद्यार्थ्याचे नाव</th>
                                <th style="width: 25%; text-align: center;">हजेरी (Present?)</th>
                            </tr>
                        </thead>
                        <tbody>
                            @for (int i = 0; i < Model.StudentList.Count; i++)
                            {
                            <tr>
                                <td>
                                    @(i + 1)
                                    <input type="hidden" asp-for="@Model.StudentList[i].StudentId" />
                                    <input type="hidden" asp-for="@Model.StudentList[i].StudentName" />
                                </td>
                                <td class="fw-bold text-secondary">@Model.StudentList[i].StudentName</td>
                                <td align="center">
                                    <div class="form-check form-switch">
                                        <!-- बाय डिफॉल्ट सर्व मुले हजर असतील -->
                                        <input class="form-check-input" type="checkbox" asp-for="@Model.StudentList[i].IsPresent" style="width: 45px; height: 24px; cursor: pointer;" checked />
                                    </div>
                                </td>
                            </tr>
                            }
                        </tbody>
                    </table>
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm">
                        💾 आजची हजेरी सेव्ह करा (Save Today's Attendance)
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
